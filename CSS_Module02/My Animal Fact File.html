<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Animal fact file</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    <style>
    body {
        background-color: darkgreen;
    }
    .fact-file {
        background-color: lightyellow;
        border:5px dotted forestgreen;
        width: 367px;
        padding: 19px;
    }
    .animal-name {
        color: darkred;
        font-family: 'Black Ops One', cursive;
    }
    .detail {
        color: orange;
    }
    .cool-fact {
        color: indigo;
    }
</style>
</head>
<body>

<div class="fact-file">

<h2 class="animal-name">Snow Leopard</h2>

<p class="detail">Type: Big Cat</p>

<p class="detail">Lives in: Mountain ranges of Central Asia</p>

<p class="detail">Diet: Deer, goats, and wild sheep</p>

<p class="cool-fact">Cool Fact: Can leap up to 15 metres in one jump!</p>

</div>

</body>
    

</html>
