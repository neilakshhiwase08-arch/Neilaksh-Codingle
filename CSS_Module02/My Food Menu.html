<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        a:hover {
            color: lightblue;
        }
        a {
            color: violet;
            border: 3px solid blue;
            border-radius: 13px;
            background-color: orange;
        }

        ul>li {
            color: red;
        }

        h1+p {
            color: green;
        }

        ul li:nth-child(2) {
            color: green;
        }
        .desc::first-letter {
            font-size: 99px;
            color: Lavender;
        }
            
    </style>
</head>
<body>
    <h1>My Food Menu</h1>

<p>Pick your favourite dish and dig in!</p>

<ul>

<li>Pizza</li>

<li>Burger</li>

<li>Tacos — Chef's Special!</li>

<li>Noodles</li>

<li>Ice Cream</li>

</ul>

<p class="desc">Every dish on this menu is made with love and

loads of flavour. Try them all and find your favourite!</p>

<div class="links">

<a href="#">Order Now</a>

<a href="#">See More</a>

</div>
    
</body>
</html>
