<!DOCTYPE html>
<html>
<head>
  <title>My Weather App Homepage</title>
   <style>
    body {
      background-image: linear-gradient(to right, lightblue, cyan, blue, darkblue)
    }
 
    h1 {
      font-size: 40px;
      color: goldenrod;
    }
 
    .weather-icon {
        font-size: 32px; font-weight: bolder;
        color: whitesmoke;
    }
 
    .weather-card {
      width: 450px;
      border: 4px solid gold;
      border-radius: 22px;
      background-image: linear-gradient(to right, lightblue, cyan);
    }

 
    #temperature {
      font-size: 49px;
      font-weight: bold;
      color: white;
    }

    @keyframes Virat {
    from{
        color: cyan;
    }
    to {
        color: blue;
    }
}
#temperature {
    animation: Virat 3s infinite alternate;
}
 
    .details {
      font-size: 20px;
      color: whitesmoke;
    }
 
    .forecast {
      width: 600px;
      border: 4px solid;
      border-radius: 22px;
      background-image: linear-gradient(to right, lightblue, cyan);
      color: gold;
    }
 
    .forecast-title {
      color: whitesmoke;
      font-size: 25px;
    }
 
    .day {
      border: 3px solid gold;
      border-radius: 1px;
      font-size: 20px;
      color: #003366;
    }
   </style>
</head>
 
<body>
    <center>
 
  <h1>My Weather App Homepage</h1>
 
  <p style="color: yellow; font-size: 22px; font-weight: bolder;">
    Checkout Today's Weather Report
  </p>
    </center>
 
  <div class="weather-card">
    <center>
    <h2 style="font-size: 29px;"  Today's Weather</h2>
    
 
    <div class="weather-icon">Sunday</div>
 
    <p id="temperature">29℃</p>
    <p class="details">City: Nagpur</p>
    <p class="details">Condition: Cloudy</p>
    <p class="details">Humidity: 67%</p>
    <p class="details">Wind Speed: 19km/h</p>
  </div>
</center>

 <center>
  <h2 style="font-size: 22px; color: yellow;">Forecast</h2>
</center>
 
  <div class="forecast">
    <center><h3 class="forecast-title">Next 4 Days</h3></center>
 
    <p class="day">Monday: Sunny - 31°C</p>
    <p class="day">Tuesday: Cloudy - 25°C</p>
    <p class="day">Wednesday: Rainy - 29°C</p>
    <p class="day">Thursday: Windy - 32°C</p
  </div>
 
</body>
</html>
